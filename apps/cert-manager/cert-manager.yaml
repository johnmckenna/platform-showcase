apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  source:
    # Uses the official Jetstack Helm chart repository directly
    repoURL: 'https://jetstack.io'
    chart: cert-manager
    targetRevision: v1.20.3 # Pins to a stable release version
    helm:
      parameters:
        # CRUCIAL: Automatically installs the required CustomResourceDefinitions (CRDs)
        - name: crds.enabled
          value: 'true'
  destination:
    server: 'https://kubernetes.kdefault.svc'
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
