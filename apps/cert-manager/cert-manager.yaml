apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  sources:
    # Uses the official Jetstack Helm chart repository directly
  - repoURL: 'https://charts.jetstack.io'
    chart: cert-manager
    targetRevision: v1.20.3 # Pins to a stable release version
    helm:
      parameters:
        # CRUCIAL: Automatically installs the required CustomResourceDefinitions (CRDs)
        - name: crds.enabled
          value: 'true'
        - name: config.enableGatewayAPI
          value: 'true'
  - repoURL: 'https://charts.jetstack.io'
    chart: trust-manager
    targetRevision: v0.24.0 # Pins to a stable release version
    helm:
      parameters:
        - name: app.trust.namespace
          value: 'cert-manager'
  - repoURL: 'https://github.com/johnmckenna/platform-showcase.git'
    targetRevision: HEAD
    path: apps/cert-manager/manifests
  destination:
    server: 'https://kubernetes.kdefault.svc'
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
