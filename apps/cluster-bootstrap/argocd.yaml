apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default

  sources:
  - repoURL: https://github.com/johnmckenna/platform-showcase.git
    targetRevision: HEAD
    path: apps/cluster-bootstrap/argocd-kustomize

  - repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 10.1.0
    helm:
      valuesObject:
        server:
          certificate:
            enabled: true
          # Gateway API integration
          httproute:
            enabled: true
            parentRefs:
              - name: cilium-gw
                namespace: kube-system
                sectionName: https
            hostnames:
              - argocd.10.89.0.10.sslip.io

          grpcroute:
            enabled: true
            parentRefs:
              - name: cilium-gw
                namespace: kube-system
                sectionName: https
            hostnames:
              - grpc.argocd.10.89.0.10.sslip.io

          # Backend TLS policy (strict)
          backendTLSPolicy:
            enabled: true
            hostname: argocd-server.argocd.svc.cluster.local
            additionalFields:
              tls:
                mode: Strict
                certificateRefs:
                  - kind: Secret
                    name: argocd-server-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ForceConflicts=true
      - AutoSyncOnConfigChange=true
