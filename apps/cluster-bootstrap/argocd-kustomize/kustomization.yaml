# +argocd:skip-file-rendering
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
- https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
- argocdgateway.yaml
- argocdroute.yaml
- argocdroutehttp.yaml
patches:
- path: argocd-cm-patch.yaml
- target:
    kind: Deployment
    name: argocd-repo-server
  patch: |
    - op: add
      path: /spec/template/metadata/annotations/config-version
      value: "2026-06-29-v1"
- target:
    kind: StatefulSet
    name: argocd-application-controller
  patch: |
    - op: add
      path: /spec/template/metadata/annotations/config-version
      value: "2026-06-29-v1"