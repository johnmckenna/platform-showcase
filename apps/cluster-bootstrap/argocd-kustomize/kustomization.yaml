# +argocd:skip-file-rendering
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
- argocd-certificate.yaml
patches:
- path: argocd-cm-patch.yaml
- target:
    kind: Deployment
    name: argocd-repo-server
  patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: argocd-repo-server
    spec:
      template:
        metadata:
          annotations:
            config-version: "2026-06-29-v1"
- target:
    kind: StatefulSet
    name: argocd-application-controller
  patch: |
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: argocd-application-controller
    spec:
      template:
        metadata:
          annotations:
            config-version: "2026-06-29-v1"