apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: argocd-backend-tls
  namespace: argocd
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: argocd-server
  tls:
    hostname: "argocd-server.argocd.svc.cluster.local"
    validation:
      caCertificateRefs:
        - group: ""
          kind: Secret
          # Target ArgoCD's internal self-signed TLS secret
          name: argocd-server-tls 
