apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10" 
spec:
  project: default
  source:
    repoURL: 'https://helm.cilium.io/'
    chart: cilium
    targetRevision: 1.20.0-pre.3
    helm:
      valuesObject:
        image:
          pullPolicy: IfNotPresent
        ipam:
          mode: kubernetes
        l2announcements:
          enabled: true
        gatewayAPI:
          enabled: true
        k8sServiceHost: control-plane-control-plane
        k8sServicePort: 6443
        kubeProxyReplacement: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false 
      selfHeal: true
  ignoreDifferences:
    - group: cilium.io
      kind: CiliumIdentity
      jsonPointers:
        - /metadata/labels
